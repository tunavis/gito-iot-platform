name: Production Safety Checks

# Run on pull requests to production branches
on:
  pull_request:
    branches:
      - main
      - master
      - production
      - release/*
  push:
    branches:
      - main
      - master
      - production

jobs:
  mock-data-detection:
    name: 🔍 Detect Mock Data & Temporary Code
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Make check script executable
        run: chmod +x scripts/check-mock-data.sh

      - name: Run Mock Data Detection
        run: |
          echo "=================================================="
          echo "Running production safety checks..."
          echo "Target Branch: ${{ github.base_ref || github.ref_name }}"
          echo "=================================================="
          ./scripts/check-mock-data.sh

      - name: Upload check results
        if: failure()
        uses: actions/upload-artifact@v3
        with:
          name: mock-data-detection-results
          path: |
            CLEANUP_TODO.md
            scripts/check-mock-data.sh

  frontend-lint:
    name: 🎨 Frontend Linting
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./web

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Type check
        run: npm run type-check

  backend-lint:
    name: 🐍 Backend Linting
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./api

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install flake8 black

      - name: Run Flake8
        run: flake8 app/ --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: Check formatting with Black
        run: black --check app/

  security-scan:
    name: 🔒 Security Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'

      - name: Upload Trivy results to GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@v2
        with:
          sarif_file: 'trivy-results.sarif'

  db-migration-bootstrap:
    name: 🗄️ DB Bootstrap (init.sql + migrations)
    runs-on: ubuntu-latest
    # Guards the invariant documented at the top of db/init.sql: a fresh
    # install (init.sql, replayed verbatim by migration 001) followed by
    # `alembic upgrade head` must succeed with zero errors. Catches, at PR
    # time, any future migration or init.sql edit that breaks a fresh install
    # instead of surfacing only when someone next builds a new environment.
    services:
      postgres:
        image: timescale/timescaledb:latest-pg16
        env:
          POSTGRES_DB: gito_ci_test
          POSTGRES_USER: gito
          POSTGRES_PASSWORD: gito_ci_test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U gito -d gito_ci_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install API dependencies
        working-directory: ./api
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Install postgresql-client
        run: sudo apt-get update && sudo apt-get install --yes postgresql-client

      - name: Apply db/init.sql (fresh-install bootstrap)
        run: psql -h localhost -U gito -d gito_ci_test -f db/init.sql
        env:
          PGPASSWORD: gito_ci_test_password

      - name: Mirror api/Dockerfile's db/init.sql layout for Alembic
        # 001_initial_schema.py resolves init.sql as a sibling of api/ (matching
        # the Docker image's `COPY db/init.sql ./db/init.sql` into /app), which a
        # bare checkout doesn't have — replicate that layout rather than the
        # migration's path logic.
        run: mkdir -p api/db && cp db/init.sql api/db/init.sql

      - name: Run alembic upgrade head on top of init.sql
        working-directory: ./api
        run: alembic upgrade head
        env:
          DATABASE_URL: postgresql+asyncpg://gito:gito_ci_test_password@localhost:5432/gito_ci_test
          JWT_SECRET_KEY: ci-test-secret-key-not-for-production-use-x
          MQTT_PASSWORD: ci-test-mqtt-password

  deployment-ready:
    name: ✅ Deployment Ready
    runs-on: ubuntu-latest
    needs: [mock-data-detection, frontend-lint, backend-lint, security-scan, db-migration-bootstrap]
    if: always()

    steps:
      - name: Check all jobs
        run: |
          if [ "${{ needs.mock-data-detection.result }}" != "success" ]; then
            echo "❌ Mock data detection failed - CANNOT DEPLOY"
            exit 1
          fi
          if [ "${{ needs.frontend-lint.result }}" != "success" ]; then
            echo "⚠️  Frontend linting failed"
            exit 1
          fi
          if [ "${{ needs.backend-lint.result }}" != "success" ]; then
            echo "⚠️  Backend linting failed"
            exit 1
          fi
          if [ "${{ needs.security-scan.result }}" != "success" ]; then
            echo "⚠️  Security scan found issues"
            exit 1
          fi
          if [ "${{ needs.db-migration-bootstrap.result }}" != "success" ]; then
            echo "❌ DB migration bootstrap failed - CANNOT DEPLOY"
            exit 1
          fi

          echo "✅ All production safety checks passed!"
          echo "This code is ready for deployment."
