<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gito · MQTT Bridge</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
  <style>
    [x-cloak] { display: none !important; }
    .pulse { animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.35} }
    .topic-row { transition: background .1s; }
    .topic-row:hover { background: rgba(16,185,129,.07); }
    pre { white-space: pre-wrap; word-break: break-all; }
    .input {
      background:#111827; border:1px solid #374151; border-radius:.375rem;
      color:#f9fafb; padding:.35rem .6rem; font-size:.75rem; font-family:inherit;
      outline:none; transition:border-color .15s; width:100%;
    }
    .input:focus { border-color:#10b981; }
    .input:disabled { opacity:.5; cursor:not-allowed; }
    .label { display:block; font-size:.68rem; color:#6b7280; margin-bottom:.2rem; text-transform:uppercase; letter-spacing:.05em; }
    .btn { border-radius:.375rem; padding:.35rem .75rem; font-size:.75rem; font-family:inherit; font-weight:700; cursor:pointer; border:none; transition:background .15s; }
    .btn-green  { background:#059669; color:#fff; }
    .btn-green:hover:not(:disabled)  { background:#10b981; }
    .btn-green:disabled { background:#374151; color:#6b7280; cursor:not-allowed; }
    .btn-red    { background:#7f1d1d; color:#fca5a5; border:1px solid #991b1b; }
    .btn-red:hover:not(:disabled) { background:#991b1b; }
    .btn-red:disabled { background:#374151; color:#6b7280; cursor:not-allowed; }
    .btn-gray   { background:#1f2937; color:#9ca3af; border:1px solid #374151; }
    .btn-gray:hover:not(:disabled) { background:#374151; }
    .card { background:#111827; border:1px solid #1f2937; border-radius:.5rem; }
    .spin { animation: spin .8s linear infinite; display:inline-block; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body class="bg-gray-950 text-gray-100 text-sm font-mono" x-data="bridge()" x-init="init()">

<!-- ── Toast notifications ─────────────────────────────────────────────────── -->
<div class="fixed bottom-5 right-5 z-[200] flex flex-col items-end gap-2 pointer-events-none">
  <template x-for="t in toasts" :key="t.id">
    <div class="pointer-events-auto flex items-center gap-2.5 pl-3.5 pr-4 py-2.5 rounded-lg shadow-2xl text-xs font-semibold border max-w-xs"
         :class="t.type==='success' ? 'bg-emerald-950 border-emerald-700 text-emerald-100' :
                 t.type==='error'   ? 'bg-red-950 border-red-700 text-red-100' :
                                      'bg-gray-800 border-gray-600 text-gray-200'">
      <span x-text="t.type==='success' ? '✓' : t.type==='error' ? '✕' : 'ℹ'"></span>
      <span x-text="t.msg" class="break-words"></span>
    </div>
  </template>
</div>

<!-- ── Top bar ──────────────────────────────────────────────────────────────── -->
<header class="flex items-center justify-between px-5 py-2.5 bg-gray-900 border-b border-gray-800 sticky top-0 z-50">
  <div class="flex items-center gap-2.5">
    <span class="text-emerald-400 font-bold">⚡ Gito</span>
    <span class="text-gray-600">/</span>
    <span class="text-gray-200 font-semibold">MQTT Bridge</span>
  </div>

  <!-- Flow status strip -->
  <div class="flex items-center gap-2 text-xs">
    <!-- External broker -->
    <div class="flex items-center gap-1.5 px-2 py-1 rounded bg-gray-800">
      <span class="w-1.5 h-1.5 rounded-full flex-shrink-0"
            :class="ext.connected ? 'bg-emerald-400 pulse' : 'bg-red-500'"></span>
      <span class="text-gray-400">External</span>
      <span :class="ext.connected ? 'text-emerald-400' : 'text-gray-600'"
            x-text="ext.connected ? ext.brokerLabel : 'Disconnected'"></span>
    </div>

    <span class="text-gray-700">→</span>

    <!-- Bridge -->
    <div class="flex items-center gap-1.5 px-2 py-1 rounded bg-gray-800">
      <span class="w-1.5 h-1.5 rounded-full bg-blue-400 flex-shrink-0"></span>
      <span class="text-blue-300">Bridge</span>
      <span class="text-gray-600" x-text="`${topics.length}t · ${activeBridges.length}b`"></span>
    </div>

    <span class="text-gray-700">→</span>

    <!-- Local Mosquitto -->
    <div class="flex items-center gap-1.5 px-2 py-1 rounded bg-gray-800">
      <span class="w-1.5 h-1.5 rounded-full flex-shrink-0"
            :class="local.connected ? 'bg-emerald-400 pulse' : 'bg-red-500'"></span>
      <span class="text-gray-400">Mosquitto</span>
      <span :class="local.connected ? 'text-emerald-400' : 'text-red-400'"
            x-text="local.connected ? 'Ready' : 'Offline'"></span>
      <button x-show="!local.connected" @click="reconnectLocal()"
              class="text-yellow-500 hover:text-yellow-300 underline ml-0.5 cursor-pointer">retry</button>
    </div>

    <span class="text-gray-700">→</span>

    <!-- Gito -->
    <div class="flex items-center gap-1.5 px-2 py-1 rounded bg-gray-800">
      <span class="w-1.5 h-1.5 rounded-full flex-shrink-0"
            :class="gito.loggedIn ? 'bg-emerald-400' : 'bg-gray-600'"></span>
      <span class="text-gray-400">Gito</span>
      <span :class="gito.loggedIn ? 'text-emerald-400' : 'text-gray-600'"
            x-text="gito.loggedIn ? gito.emailDisplay : 'Not logged in'"></span>
    </div>
  </div>
</header>

<!-- ── Main layout ───────────────────────────────────────────────────────────── -->
<div class="flex" style="height:calc(100vh - 44px)">

  <!-- Left sidebar ─────────────────────────────────────────────────────────── -->
  <div class="w-72 flex-shrink-0 border-r border-gray-800 flex flex-col overflow-hidden">

    <!-- Step 1: External Broker -->
    <div class="border-b border-gray-800">
      <button @click="panels.broker = !panels.broker"
              class="w-full flex items-center justify-between px-4 py-2.5 hover:bg-gray-900 transition">
        <div class="flex items-center gap-2">
          <span class="text-xs font-bold uppercase tracking-widest text-gray-500">1</span>
          <span class="text-xs font-semibold text-gray-300">External Broker</span>
          <span x-show="ext.connected" class="text-xs text-emerald-500">✓</span>
        </div>
        <span class="text-gray-600 text-xs" x-text="panels.broker ? '▲' : '▼'"></span>
      </button>
      <div x-show="panels.broker" x-cloak class="px-4 pb-4 space-y-2">
        <div>
          <label class="label">Host</label>
          <input x-model="brokerForm.host" class="input" @keydown.enter="connectBroker()" />
        </div>
        <div class="flex gap-2">
          <div class="flex-shrink-0" style="width:72px">
            <label class="label">Port</label>
            <input x-model.number="brokerForm.port" type="number" class="input" />
          </div>
          <div class="flex-1">
            <label class="label">Topic filter</label>
            <input x-model="brokerForm.topicFilter" placeholder="#" class="input" />
          </div>
        </div>
        <div>
          <label class="label">Username <span class="text-gray-700">(optional)</span></label>
          <input x-model="brokerForm.username" class="input" />
        </div>
        <div>
          <label class="label">Password <span class="text-gray-700">(optional)</span></label>
          <input x-model="brokerForm.password" type="password" class="input" />
        </div>
        <div class="flex gap-2 pt-1">
          <button @click="connectBroker()" :disabled="brokerForm.connecting"
                  class="btn btn-green flex-1">
            <span x-show="brokerForm.connecting" class="spin w-3 h-3 border-2 border-white/30 border-t-white rounded-full mr-1 align-middle"></span>
            <span x-text="brokerForm.connecting ? 'Connecting…' : (ext.connected ? 'Reconnect' : 'Connect')"></span>
          </button>
          <button x-show="ext.connected" @click="disconnectBroker()" class="btn btn-red px-3">✕</button>
        </div>
        <p x-show="ext.message && !ext.connected" class="text-xs text-red-400 mt-1 break-words" x-text="ext.message"></p>
        <p x-show="ext.message && ext.connected" class="text-xs text-emerald-600 mt-1" x-text="ext.message"></p>
      </div>
    </div>

    <!-- Step 2: Gito Login -->
    <div class="border-b border-gray-800">
      <button @click="panels.gito = !panels.gito"
              class="w-full flex items-center justify-between px-4 py-2.5 hover:bg-gray-900 transition">
        <div class="flex items-center gap-2 min-w-0 overflow-hidden">
          <span class="text-xs font-bold uppercase tracking-widest text-gray-500 flex-shrink-0">2</span>
          <span class="text-xs font-semibold text-gray-300 flex-shrink-0">Gito Login</span>
          <span x-show="gito.loggedIn" class="text-xs text-emerald-500 truncate"
                x-text="'✓ ' + gito.emailDisplay"></span>
        </div>
        <span class="text-gray-600 text-xs flex-shrink-0 ml-1" x-text="panels.gito ? '▲' : '▼'"></span>
      </button>
      <div x-show="panels.gito" x-cloak class="px-4 pb-4 space-y-2">

        <!-- ── Connected state ── -->
        <template x-if="gito.loggedIn">
          <div class="space-y-2">
            <div class="bg-emerald-950 border border-emerald-800 rounded p-3 flex items-center gap-2">
              <span class="w-2 h-2 rounded-full bg-emerald-400 pulse flex-shrink-0"></span>
              <div class="min-w-0">
                <p class="text-xs text-emerald-300 font-bold">Connected to Gito</p>
                <p class="text-xs text-emerald-600 truncate" x-text="gito.emailDisplay"></p>
              </div>
            </div>
            <div class="flex gap-2">
              <button @click="logoutGito()" class="btn btn-gray flex-1 text-xs">Sign out</button>
              <button @click="loginGito()" :disabled="gitoForm.loading || !gitoForm.password"
                      class="btn btn-gray flex-1 text-xs" title="Log in as a different user">
                Switch user
              </button>
            </div>
          </div>
        </template>

        <!-- ── Login form ── -->
        <template x-if="!gito.loggedIn">
          <div class="space-y-2">
            <div>
              <label class="label">Gito URL</label>
              <input x-model="gitoForm.url" class="input" :disabled="gitoForm.loading" />
            </div>
            <div>
              <label class="label">Email</label>
              <input x-model="gitoForm.email" type="email" class="input"
                     :disabled="gitoForm.loading"
                     @keydown.enter="$refs.gitoPwd.focus()" />
            </div>
            <div>
              <label class="label">Password</label>
              <input x-model="gitoForm.password" type="password" class="input"
                     x-ref="gitoPwd" :disabled="gitoForm.loading"
                     @keydown.enter="loginGito()" />
            </div>
            <button @click="loginGito()"
                    :disabled="gitoForm.loading || !gitoForm.email || !gitoForm.password"
                    class="btn btn-green w-full mt-1">
              <span x-show="gitoForm.loading" class="spin w-3 h-3 border-2 border-white/30 border-t-white rounded-full mr-1.5 align-middle"></span>
              <span x-text="gitoForm.loading ? 'Logging in…' : 'Log in to Gito'"></span>
            </button>
            <p x-show="gitoForm.error" class="text-xs text-red-400 break-words" x-text="gitoForm.error"></p>
          </div>
        </template>
      </div>
    </div>

    <!-- Step 3: Topics -->
    <div class="flex flex-col flex-1 overflow-hidden">
      <div class="px-4 py-2 flex items-center justify-between border-b border-gray-800">
        <div class="flex items-center gap-2">
          <span class="text-xs font-bold uppercase tracking-widest text-gray-500">3</span>
          <span class="text-xs font-semibold text-gray-300">Topics</span>
          <span class="text-xs text-gray-600"
                x-text="topics.length ? `(${groupedTopics.length}g · ${topics.length}t)` : '(0)'"></span>
        </div>
        <div class="flex items-center gap-1.5">
          <input x-model="topicSearch" placeholder="filter…"
                 class="input text-xs py-0.5 px-2" style="width:80px" />
          <!-- Clear filter -->
          <button x-show="topicSearch" @click="topicSearch = ''"
                  class="text-gray-600 hover:text-gray-400 text-xs" title="Clear filter">✕</button>
          <!-- Clear all discovered topics -->
          <button x-show="!topicSearch && topics.length > 0" @click="clearTopics()"
                  class="text-gray-700 hover:text-red-500 text-xs" title="Clear all topics">⊘</button>
        </div>
      </div>

      <div class="flex-1 overflow-y-auto">
        <template x-if="topics.length === 0">
          <div class="flex flex-col items-center justify-center py-16 text-gray-700">
            <p class="text-3xl mb-2">📡</p>
            <p class="text-xs text-center">Connect to a broker to<br>see live device topics</p>
          </div>
        </template>

        <template x-for="g in groupedTopics" :key="g.prefix">
          <div>
            <!-- Collapsed group / single-topic row -->
            <template x-if="g.isSingleTopic || expandedGroup !== g.prefix">
              <div @click="g.isSingleTopic ? selectTopic(g.topics[0]) : (expandedGroup = g.prefix)"
                   class="topic-row cursor-pointer px-4 py-2 flex items-start gap-2 border-b border-gray-800/40"
                   :class="g.isSingleTopic && selectedTopic?.topic === g.topics[0].topic
                     ? 'bg-emerald-950/50 border-l-2 border-l-emerald-500' : ''">
                <div class="flex-1 min-w-0">
                  <p class="text-xs text-gray-200 truncate font-semibold"
                     x-text="g.isSingleTopic ? g.topics[0].topic : g.prefix"></p>
                  <p class="text-xs text-gray-600 truncate mt-0.5"
                     x-text="Object.keys(g.mergedMetrics).slice(0,4).join(' · ')"></p>
                </div>
                <div class="flex-shrink-0 flex flex-col items-end gap-0.5">
                  <span class="text-xs rounded-full px-1.5 py-0.5 font-bold"
                        :class="g.isBridged ? 'bg-emerald-900 text-emerald-300' : 'bg-gray-800 text-gray-500'"
                        x-text="g.totalCount"></span>
                  <template x-if="g.isSingleTopic && g.topics[0].last_seen">
                    <span class="text-xs text-gray-700" x-text="timeAgo(g.topics[0].last_seen)"></span>
                  </template>
                  <template x-if="!g.isSingleTopic">
                    <span class="text-xs text-gray-600" x-text="`${g.topics.length} ▼`"></span>
                  </template>
                  <span x-show="g.isBridged" class="text-xs leading-none">🔗</span>
                </div>
              </div>
            </template>

            <!-- Expanded group -->
            <template x-if="!g.isSingleTopic && expandedGroup === g.prefix">
              <div>
                <div @click="expandedGroup = null"
                     class="topic-row cursor-pointer px-4 py-1.5 flex items-center justify-between gap-2 border-b border-gray-800/40 bg-gray-900/60">
                  <p class="text-xs text-emerald-500 font-semibold truncate" x-text="g.prefix"></p>
                  <span class="text-gray-600 text-xs flex-shrink-0">▲</span>
                </div>
                <template x-for="t in g.topics" :key="t.topic">
                  <div @click="selectTopic(t)"
                       class="topic-row cursor-pointer px-4 py-2 pl-7 flex items-start gap-2 border-b border-gray-800/40"
                       :class="selectedTopic?.topic === t.topic
                         ? 'bg-emerald-950/50 border-l-2 border-l-emerald-500' : ''">
                    <div class="flex-1 min-w-0">
                      <p class="text-xs text-gray-300 truncate" x-text="t.topic.split('/').pop()"></p>
                      <p class="text-xs text-gray-700 truncate mt-0.5"
                         x-text="Object.keys(t.metrics || {}).slice(0,3).join(' · ')"></p>
                    </div>
                    <div class="flex-shrink-0 flex flex-col items-end gap-0.5">
                      <span class="text-xs rounded-full px-1.5 py-0.5 font-bold"
                            :class="isBridged(t.topic) ? 'bg-emerald-900 text-emerald-300' : 'bg-gray-800 text-gray-500'"
                            x-text="t.count"></span>
                      <span x-show="t.last_seen" class="text-xs text-gray-700" x-text="timeAgo(t.last_seen)"></span>
                      <span x-show="isBridged(t.topic)" class="text-xs leading-none">🔗</span>
                    </div>
                  </div>
                </template>
              </div>
            </template>
          </div>
        </template>
      </div>
    </div>

    <!-- Step 4: Simulator -->
    <div class="border-t border-gray-800 flex-shrink-0">
      <button @click="panels.simulator = !panels.simulator"
              class="w-full flex items-center justify-between px-4 py-2.5 hover:bg-gray-900 transition">
        <div class="flex items-center gap-2">
          <span class="text-xs font-bold uppercase tracking-widest text-gray-500">4</span>
          <span class="text-xs font-semibold text-gray-300">Simulator</span>
        </div>
        <div class="flex items-center gap-2">
          <span x-show="simulator.running" class="flex items-center gap-1 text-xs text-emerald-400">
            <span class="w-1.5 h-1.5 rounded-full bg-emerald-400 pulse"></span>Running
          </span>
          <span x-show="!simulator.running" class="text-xs text-gray-600">Stopped</span>
          <span class="text-gray-600 text-xs" x-text="panels.simulator ? '▲' : '▼'"></span>
        </div>
      </button>
      <div x-show="panels.simulator" x-cloak class="px-3 pb-3 space-y-2.5">
        <p class="text-xs text-gray-600 leading-relaxed">
          Publishes synthetic telemetry for all active Gito devices. Auto-detects new devices every 10s.
        </p>
        <template x-if="gito.loggedIn && gitoDevices.length > 0">
          <div class="text-xs text-gray-500">
            Devices: <span class="text-gray-200 font-semibold" x-text="gitoDevices.length"></span>
          </div>
        </template>
        <div x-show="!simulator.running">
          <label class="label">Interval (seconds)</label>
          <input x-model.number="simulator.interval" type="number" min="5" max="300" class="input" />
        </div>
        <template x-if="simulator.running && simulator.pid">
          <div class="text-xs text-gray-600">PID: <span class="text-gray-400" x-text="simulator.pid"></span></div>
        </template>
        <button x-show="!simulator.running" @click="startSimulator()"
                :disabled="simulator.loading" class="btn btn-green w-full py-2 text-xs">
          <span x-show="simulator.loading" class="spin w-3 h-3 border-2 border-white/30 border-t-white rounded-full mr-1 align-middle"></span>
          <span x-text="simulator.loading ? 'Starting…' : '▶ Start Simulator'"></span>
        </button>
        <button x-show="simulator.running" @click="stopSimulator()"
                :disabled="simulator.loading" class="btn btn-red w-full py-2 text-xs">
          <span x-show="simulator.loading" class="spin w-3 h-3 border-2 border-red-300/30 border-t-red-300 rounded-full mr-1 align-middle"></span>
          <span x-text="simulator.loading ? 'Stopping…' : '■ Stop Simulator'"></span>
        </button>
      </div>
    </div>

  </div>

  <!-- Right area ────────────────────────────────────────────────────────────── -->
  <div class="flex-1 flex flex-col overflow-hidden">

    <!-- No topic selected -->
    <template x-if="!selectedTopic">
      <div class="flex flex-col items-center justify-center flex-1 text-gray-700">
        <p class="text-6xl mb-5">🛰️</p>
        <p class="font-semibold text-gray-400 mb-1">Select a topic to get started</p>
        <p class="text-xs text-center leading-relaxed">
          Connect your external broker (Step 1) and watch topics appear.<br>
          Pick one, register it as a Gito device, then start the bridge.
        </p>
        <!-- Live status diagram -->
        <div class="mt-8 flex items-center gap-3 text-xs">
          <div class="px-3 py-2 rounded border flex flex-col items-center gap-0.5"
               :class="ext.connected ? 'border-emerald-800 text-emerald-400' : 'border-gray-800 text-gray-600'">
            <span>External MQTT</span>
            <span x-text="ext.connected ? '● connected' : '○ disconnected'"></span>
          </div>
          <span class="text-gray-700">──►</span>
          <div class="px-3 py-2 rounded bg-gray-900 border border-emerald-900 text-emerald-500">bridge_ui.py</div>
          <span class="text-gray-700">──►</span>
          <div class="px-3 py-2 rounded border flex flex-col items-center gap-0.5"
               :class="local.connected ? 'border-emerald-800 text-emerald-400' : 'border-gray-800 text-gray-600'">
            <span>Mosquitto</span>
            <span x-text="local.connected ? '● ready' : '○ offline'"></span>
          </div>
          <span class="text-gray-700">──►</span>
          <div class="px-3 py-2 rounded bg-gray-900 border border-gray-800 text-gray-500">Gito DB</div>
        </div>
      </div>
    </template>

    <!-- Topic selected -->
    <template x-if="selectedTopic">
      <div class="flex flex-1 overflow-hidden">

        <!-- Center: payload + metrics -->
        <div class="flex-1 flex flex-col overflow-hidden border-r border-gray-800">

          <!-- Topic header -->
          <div class="px-5 py-3 border-b border-gray-800 flex items-center justify-between flex-shrink-0">
            <div class="min-w-0">
              <p class="text-xs text-gray-600 uppercase tracking-widest mb-0.5">External topic</p>
              <p class="text-emerald-400 font-semibold text-sm truncate" x-text="selectedTopic.topic"></p>
            </div>
            <div class="text-right text-xs text-gray-600 flex-shrink-0 ml-4">
              <p><span class="text-white font-bold" x-text="selectedTopic.count"></span> messages</p>
              <p x-text="selectedTopic.last_seen ? timeAgo(selectedTopic.last_seen) + ' ago' : 'no data yet'"></p>
            </div>
          </div>

          <!-- Raw payload -->
          <div class="px-5 pt-4 pb-3 border-b border-gray-800 flex-shrink-0">
            <p class="label mb-2">Latest raw payload</p>
            <pre class="bg-gray-900 rounded p-3 text-xs text-green-300 overflow-auto max-h-36"
                 x-text="selectedTopic.last_payload ? formatJson(selectedTopic.parsed) : '(waiting for data…)'"></pre>
          </div>

          <!-- Metrics -->
          <div class="px-5 py-4 flex-1 overflow-auto">
            <div class="flex items-center justify-between mb-3">
              <p class="label">Metrics forwarded to Gito</p>
              <span class="text-xs"
                    :class="Object.keys(selectedTopic.metrics||{}).length > 0 ? 'text-emerald-600' : 'text-gray-700'"
                    x-text="`${Object.keys(selectedTopic.metrics||{}).length} metric(s)`"></span>
            </div>

            <template x-if="Object.keys(selectedTopic.metrics||{}).length === 0">
              <div class="bg-yellow-950/40 border border-yellow-900/50 rounded p-3 mb-4">
                <p class="text-yellow-500 text-xs font-semibold">No metrics detected</p>
                <p class="text-yellow-700 text-xs mt-1">
                  No numeric or string values found in this payload. mqtt_processor may not store anything.
                </p>
              </div>
            </template>

            <template x-if="Object.keys(selectedTopic.metrics||{}).length > 0">
              <div class="border border-gray-700 rounded overflow-hidden mb-4">
                <div class="grid bg-gray-800/80 border-b border-gray-700"
                     style="grid-template-columns:1fr auto auto">
                  <span class="px-3 py-1.5 text-gray-500 text-xs uppercase tracking-widest">Key</span>
                  <span class="px-3 py-1.5 text-gray-500 text-xs uppercase tracking-widest text-right">Value</span>
                  <span class="px-3 py-1.5 text-gray-500 text-xs uppercase tracking-widest text-right" style="min-width:56px">Type</span>
                </div>
                <template x-for="[key, val] in Object.entries(selectedTopic.metrics||{})" :key="key">
                  <div class="grid border-b border-gray-800 last:border-b-0 hover:bg-gray-800/40"
                       style="grid-template-columns:1fr auto auto">
                    <span class="px-3 py-2 text-xs text-gray-300 font-mono truncate" x-text="key"></span>
                    <span class="px-3 py-2 text-xs text-emerald-400 font-mono text-right"
                          x-text="typeof val==='number' ? val.toFixed(3) : String(val)"></span>
                    <span class="px-3 py-2 text-xs text-gray-600 text-right font-mono" style="min-width:56px"
                          x-text="typeof val==='number' ? 'num' : typeof val==='boolean' ? 'bool' : 'str'"></span>
                  </div>
                </template>
              </div>
            </template>

            <!-- Route preview -->
            <template x-if="gito.loggedIn && isBridged(selectedTopic.topic)">
              <div class="bg-emerald-950/30 rounded p-3 border border-emerald-900/40">
                <p class="text-xs text-gray-600 uppercase tracking-widest mb-1">Publishing to</p>
                <p class="text-emerald-500 text-xs font-mono break-all"
                   x-text="`${gito.tenantId}/devices/${bridgeForTopic(selectedTopic.topic)?.device_id}/telemetry`"></p>
              </div>
            </template>
            <template x-if="gito.loggedIn && !isBridged(selectedTopic.topic)">
              <div class="bg-gray-900/60 rounded p-3 border border-gray-800">
                <p class="text-xs text-gray-600 uppercase tracking-widest mb-1">Will publish to</p>
                <p class="text-yellow-700 text-xs font-mono"
                   x-text="`${gito.tenantId}/devices/{device_id}/telemetry`"></p>
              </div>
            </template>
          </div>
        </div>

        <!-- Right: Register & Bridge panel -->
        <div class="flex-shrink-0 flex flex-col overflow-hidden" style="width:300px">
          <div class="px-5 py-3 border-b border-gray-800 flex-shrink-0">
            <p class="text-xs font-bold uppercase tracking-widest text-gray-400">Register Device</p>
          </div>

          <div class="flex-1 overflow-auto px-5 py-4">

            <!-- Already bridged -->
            <template x-if="isBridged(selectedTopic.topic)">
              <div class="space-y-3">
                <div class="bg-emerald-950 border border-emerald-800 rounded p-3">
                  <p class="text-emerald-300 text-xs font-bold mb-1">🔗 Bridge Active</p>
                  <p class="text-emerald-500/70 text-xs leading-relaxed">
                    Telemetry is flowing into Gito via local Mosquitto.
                  </p>
                </div>
                <div class="card p-3 text-xs space-y-1.5">
                  <div class="flex justify-between gap-2">
                    <span class="text-gray-500">Device</span>
                    <span class="text-white font-bold truncate" x-text="bridgeForTopic(selectedTopic.topic)?.device_name"></span>
                  </div>
                  <div class="flex justify-between">
                    <span class="text-gray-500">Forwarded</span>
                    <span class="text-white font-bold" x-text="bridgeForTopic(selectedTopic.topic)?.count"></span>
                  </div>
                  <div class="flex justify-between">
                    <span class="text-gray-500">Status</span>
                    <span :class="bridgeForTopic(selectedTopic.topic)?.status==='ok' ? 'text-emerald-400' : 'text-red-400'"
                          x-text="bridgeForTopic(selectedTopic.topic)?.status"></span>
                  </div>
                </div>
                <button @click="stopBridgeForTopic(selectedTopic.topic)" class="btn btn-red w-full">
                  Stop Bridge
                </button>
              </div>
            </template>

            <!-- Create / Link form -->
            <template x-if="!isBridged(selectedTopic.topic)">
              <div class="space-y-3">

                <!-- Prerequisite warnings -->
                <template x-if="!local.connected">
                  <div class="bg-red-950/60 border border-red-800/60 rounded p-3">
                    <p class="text-red-300 text-xs font-bold">⚠ Mosquitto offline</p>
                    <p class="text-red-500/70 text-xs mt-1">Check Docker is running.</p>
                  </div>
                </template>
                <template x-if="!gito.loggedIn">
                  <div class="bg-yellow-950/50 border border-yellow-900/50 rounded p-3">
                    <p class="text-yellow-300 text-xs">⚠ Log in to Gito first (Step 2)</p>
                  </div>
                </template>

                <!-- Mode tabs -->
                <div class="flex rounded overflow-hidden border border-gray-700 text-xs">
                  <button @click="linkMode = 'create'"
                          class="flex-1 py-1.5 font-semibold transition border-r border-gray-700"
                          :class="linkMode==='create'
                            ? 'bg-emerald-900 text-emerald-300'
                            : 'bg-gray-800 text-gray-500 hover:text-gray-300'">
                    + New Device
                  </button>
                  <button @click="switchToLinkMode()"
                          class="flex-1 py-1.5 font-semibold transition"
                          :class="linkMode==='link'
                            ? 'bg-emerald-900 text-emerald-300'
                            : 'bg-gray-800 text-gray-500 hover:text-gray-300'">
                    Link Existing
                  </button>
                </div>

                <!-- CREATE tab -->
                <div x-show="linkMode === 'create'" class="space-y-3">
                  <div>
                    <label class="label">Device name *</label>
                    <input x-model="newDevice.name"
                           :placeholder="suggestName(selectedTopic.topic)"
                           class="input"
                           :class="newDevice.name.trim() ? 'border-emerald-800' : ''" />
                  </div>
                  <div>
                    <label class="label">Device type <span class="text-gray-700">(optional)</span></label>
                    <select x-model="newDevice.deviceTypeId" class="input">
                      <option value="">— none —</option>
                      <template x-for="dt in deviceTypes" :key="dt.id">
                        <option :value="dt.id" x-text="dt.name"></option>
                      </template>
                    </select>
                  </div>
                  <div>
                    <label class="label">Description <span class="text-gray-700">(optional)</span></label>
                    <input x-model="newDevice.description" placeholder="e.g. Outdoor sensor" class="input" />
                  </div>
                  <div>
                    <label class="label">Location <span class="text-gray-700">(optional)</span></label>
                    <input x-model="newDevice.location" placeholder="e.g. Warehouse A" class="input" />
                  </div>
                  <button @click="createAndBridge()"
                          :disabled="!gito.loggedIn || !local.connected || creating || !newDevice.name.trim()"
                          class="btn btn-green w-full py-2.5 mt-2">
                    <span x-show="creating" class="spin w-3 h-3 border-2 border-white/30 border-t-white rounded-full mr-1.5 align-middle"></span>
                    <span x-text="creating ? 'Creating…' : '🚀 Create &amp; Start Bridge'"></span>
                  </button>
                  <p x-show="createError" class="text-xs text-red-400 break-words" x-text="createError"></p>
                </div>

                <!-- LINK tab -->
                <div x-show="linkMode === 'link'" class="space-y-2">
                  <template x-if="!gito.loggedIn">
                    <p class="text-xs text-gray-600 text-center py-4">Log in to Gito to see your devices.</p>
                  </template>
                  <template x-if="gito.loggedIn">
                    <div class="space-y-2">
                      <div class="flex items-center gap-2">
                        <input x-model="deviceSearch" placeholder="search devices…" class="input flex-1" />
                        <button @click="loadGitoDevices()" :disabled="loadingDevices"
                                class="btn btn-gray px-2.5 py-1 text-xs flex-shrink-0" title="Refresh list">
                          <span x-show="!loadingDevices">↺</span>
                          <span x-show="loadingDevices" class="spin w-3 h-3 border-2 border-gray-500/30 border-t-gray-400 rounded-full"></span>
                        </button>
                      </div>

                      <div class="border border-gray-700 rounded overflow-hidden max-h-52 overflow-y-auto">
                        <template x-if="loadingDevices">
                          <div class="flex items-center justify-center py-6 gap-2 text-gray-600 text-xs">
                            <span class="spin w-3 h-3 border-2 border-gray-600/30 border-t-gray-600 rounded-full"></span>
                            Loading…
                          </div>
                        </template>
                        <template x-if="!loadingDevices && gitoDevices.length === 0">
                          <p class="text-xs text-gray-600 text-center py-4 px-3">No devices in Gito yet.</p>
                        </template>
                        <template x-if="!loadingDevices && filteredGitoDevices.length === 0 && gitoDevices.length > 0">
                          <p class="text-xs text-gray-600 text-center py-4">
                            No match for "<span x-text="deviceSearch"></span>"
                          </p>
                        </template>
                        <template x-if="!loadingDevices && filteredGitoDevices.length > 0">
                          <template x-for="dev in filteredGitoDevices" :key="dev.id">
                            <div @click="selectedDevice = dev"
                                 class="px-3 py-2 cursor-pointer border-b border-gray-800 last:border-b-0 transition"
                                 :class="selectedDevice?.id === dev.id
                                   ? 'bg-emerald-950 border-l-2 border-l-emerald-500'
                                   : 'hover:bg-gray-800'">
                              <div class="flex items-center justify-between gap-2">
                                <div class="min-w-0">
                                  <p class="text-xs text-gray-200 font-semibold truncate" x-text="dev.name"></p>
                                  <p class="text-xs text-gray-600 truncate" x-text="dev.device_type || '—'"></p>
                                </div>
                                <span class="flex-shrink-0 text-xs rounded-full px-1.5 py-0.5 font-bold"
                                      :class="dev.status==='active' ? 'bg-emerald-900 text-emerald-300' : 'bg-gray-800 text-gray-500'"
                                      x-text="dev.status || '?'"></span>
                              </div>
                            </div>
                          </template>
                        </template>
                      </div>

                      <template x-if="selectedDevice">
                        <div class="card px-3 py-2 text-xs bg-emerald-950/20 border-emerald-900/50">
                          <p class="text-gray-500">Selected →</p>
                          <p class="text-emerald-300 font-semibold" x-text="selectedDevice.name"></p>
                        </div>
                      </template>

                      <button @click="linkAndBridge()"
                              :disabled="!gito.loggedIn || !local.connected || linking || !selectedDevice"
                              class="btn btn-green w-full py-2.5 mt-1">
                        <span x-show="linking" class="spin w-3 h-3 border-2 border-white/30 border-t-white rounded-full mr-1.5 align-middle"></span>
                        <span x-text="linking ? 'Starting…' : '🔗 Link &amp; Start Bridge'"></span>
                      </button>
                      <p x-show="linkError" class="text-xs text-red-400 break-words" x-text="linkError"></p>
                    </div>
                  </template>
                </div>

              </div>
            </template>
          </div>
        </div>
      </div>
    </template>

    <!-- Bridges strip ─────────────────────────────────────────────────────── -->
    <template x-if="mergedBridges.length > 0">
      <div class="border-t border-gray-800 flex-shrink-0">
        <div class="px-5 py-2 flex items-center gap-3 border-b border-gray-800">
          <span class="text-xs font-bold uppercase tracking-widest text-gray-500">Bridges</span>
          <span class="text-xs rounded-full px-1.5 bg-gray-700 text-gray-300 font-bold"
                x-text="mergedBridges.length"></span>
          <template x-if="activeBridges.length > 0">
            <span class="flex items-center gap-1 text-xs text-emerald-500">
              <span class="w-1.5 h-1.5 bg-emerald-400 rounded-full pulse"></span>
              <span x-text="activeBridges.length + ' active'"></span>
            </span>
          </template>
          <span class="text-xs text-gray-700">Saved sessions — Resume to restart forwarding</span>
        </div>
        <div class="flex gap-3 px-5 py-3 overflow-x-auto">
          <template x-for="s in mergedBridges" :key="s.topic">
            <div class="flex-shrink-0 card rounded px-4 py-3 min-w-56"
                 :class="s.active ? 'border-emerald-800/60' : 'border-gray-800'">
              <div class="flex items-start justify-between gap-2 mb-2">
                <div class="min-w-0">
                  <p class="text-white font-semibold text-xs truncate" x-text="s.device_name"></p>
                  <p class="text-gray-600 text-xs truncate" x-text="s.topic"></p>
                  <p x-show="s.active && s.count !== undefined"
                     class="text-emerald-700 text-xs" x-text="s.count + ' forwarded'"></p>
                </div>
                <div class="flex-shrink-0 mt-0.5">
                  <span x-show="s.active" class="w-2 h-2 bg-emerald-400 rounded-full pulse block"></span>
                  <span x-show="!s.active" class="w-2 h-2 bg-gray-600 rounded-full block"></span>
                </div>
              </div>
              <div class="flex items-center gap-2 text-xs">
                <button x-show="!s.active" @click="resumeBridge(s.topic)"
                        :disabled="!ext.connected || !gito.loggedIn"
                        class="btn btn-green px-2.5 py-1 text-xs disabled:opacity-40">
                  ▶ Resume
                </button>
                <button x-show="s.active" @click="stopBridgeForTopic(s.topic)"
                        class="btn btn-red px-2.5 py-1 text-xs">
                  ■ Stop
                </button>
                <button x-show="!s.active" @click="deleteSaved(s.topic)"
                        class="text-gray-700 hover:text-red-500 ml-auto" title="Remove saved bridge">✕</button>
              </div>
            </div>
          </template>
        </div>
      </div>
    </template>

  </div>
</div>

<!-- ── Alpine app ─────────────────────────────────────────────────────────── -->
<script>
function bridge() {
  return {
    panels: { broker: true, gito: true, simulator: false },

    brokerForm: {
      host: '{{ broker_host }}',
      port: {{ broker_port }},
      username: '',
      password: '',
      topicFilter: '#',
      connecting: false,
    },
    ext: { connected: false, message: '', brokerLabel: '' },
    local: { connected: false, message: '' },

    gitoForm: {
      url: '{{ gito_url_default }}',
      email: '{{ gito_email_default }}',
      password: '',
      loading: false,
      error: '',
    },
    gito: { loggedIn: false, tenantId: null, emailDisplay: '' },

    topics: [],
    topicSearch: '',
    selectedTopic: null,
    expandedGroup: null,

    deviceTypes: [],
    newDevice: { name: '', deviceTypeId: '', description: '', location: '' },
    creating: false,
    createError: '',

    gitoDevices: [],
    loadingDevices: false,
    linkMode: 'create',
    selectedDevice: null,
    deviceSearch: '',
    linking: false,
    linkError: '',

    simulator: { running: false, pid: null, loading: false, interval: 30 },

    bridges: [],
    savedBridges: [],

    toasts: [],
    _tick: 0,   // incremented every 5s to refresh timeAgo displays

    // ── Toast ──────────────────────────────────────────────────────────────
    toast(msg, type = 'info', duration = 4000) {
      const id = Date.now() + Math.random();
      this.toasts.push({ id, msg, type });
      setTimeout(() => { this.toasts = this.toasts.filter(t => t.id !== id); }, duration);
    },

    // ── Computed ───────────────────────────────────────────────────────────
    get filteredTopics() {
      const q = this.topicSearch.toLowerCase();
      return q ? this.topics.filter(t => t.topic.toLowerCase().includes(q)) : this.topics;
    },
    get activeBridges() {
      return this.bridges.filter(b => b.active);
    },
    get groupedTopics() {
      const prefixMap = new Map();
      for (const t of this.filteredTopics) {
        const parts  = t.topic.split('/');
        const prefix = parts.length > 1 ? parts.slice(0, -1).join('/') : t.topic;
        if (!prefixMap.has(prefix)) prefixMap.set(prefix, []);
        prefixMap.get(prefix).push(t);
      }
      const groups = [];
      for (const [prefix, topicsInGroup] of prefixMap) {
        const mergedMetrics = {};
        let totalCount = 0;
        for (const t of topicsInGroup) {
          Object.assign(mergedMetrics, t.metrics || {});
          totalCount += (t.count || 0);
        }
        groups.push({
          prefix,
          topics:        topicsInGroup,
          mergedMetrics,
          totalCount,
          isBridged:     topicsInGroup.some(t => this.bridges.some(b => b.topic === t.topic && b.active)),
          isSingleTopic: topicsInGroup.length === 1,
        });
      }
      groups.sort((a, b) => {
        if (a.isBridged !== b.isBridged) return a.isBridged ? -1 : 1;
        return b.totalCount - a.totalCount;
      });
      return groups;
    },
    get filteredGitoDevices() {
      const q = this.deviceSearch.toLowerCase();
      return q
        ? this.gitoDevices.filter(d =>
            d.name.toLowerCase().includes(q) ||
            (d.device_type || '').toLowerCase().includes(q))
        : this.gitoDevices;
    },
    // Single merged strip: savedBridges with live stats overlaid
    get mergedBridges() {
      return this.savedBridges.map(s => {
        const live = this.bridges.find(b => b.topic === s.topic && b.active);
        return live ? { ...s, active: true, count: live.count, status: live.status } : s;
      });
    },

    // ── Helpers ────────────────────────────────────────────────────────────
    timeAgo(isoStr) {
      if (!isoStr) return '';
      void this._tick; // reactive dependency — re-runs every 5s
      const diff = Math.floor(
        (Date.now() - new Date(isoStr.endsWith('Z') ? isoStr : isoStr + 'Z')) / 1000
      );
      if (diff < 2)    return 'now';
      if (diff < 60)   return `${diff}s`;
      if (diff < 3600) return `${Math.floor(diff / 60)}m`;
      return `${Math.floor(diff / 3600)}h`;
    },

    formatJson(obj) {
      if (!obj) return '';
      try { return JSON.stringify(obj, null, 2); } catch (_) { return String(obj); }
    },

    suggestName(topic) {
      const parts = topic.split('/').filter(Boolean);
      const last   = parts[parts.length - 1] || '';
      const second = parts[parts.length - 2] || '';
      const skip   = ['telemetry', 'data', 'up', 'state', 'sensor', 'out', 'in'];
      return skip.includes(last.toLowerCase()) && second ? second : last || topic;
    },

    isBridged(topic) {
      return this.bridges.some(b => b.topic === topic && b.active);
    },
    bridgeForTopic(topic) {
      return this.bridges.find(b => b.topic === topic && b.active);
    },

    clearTopics() {
      if (!confirm(`Clear all ${this.topics.length} discovered topics?`)) return;
      this.topics        = [];
      this.selectedTopic = null;
      this.expandedGroup = null;
      this.selectedDevice = null;
      this.deviceSearch   = '';
    },

    // ── Broker ─────────────────────────────────────────────────────────────
    async connectBroker() {
      this.brokerForm.connecting = true;
      this.ext.message = '';
      try {
        const r = await fetch('/api/connect', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            host:         this.brokerForm.host,
            port:         this.brokerForm.port,
            username:     this.brokerForm.username,
            password:     this.brokerForm.password,
            topic_filter: this.brokerForm.topicFilter || '#',
          }),
        });
        const d = await r.json();
        this.ext.message = d.message || '';
        if (!d.ok) {
          // Connection attempt rejected before it started (e.g. bad config)
          this.toast(d.message || 'Connection failed', 'error');
          this.brokerForm.connecting = false;
        }
        // If ok: keep connecting=true — broker_status Socket.IO event will clear it
      } catch (e) {
        // Can't reach bridge_ui server at all
        this.ext.message = String(e);
        this.toast('Connection error: ' + String(e), 'error');
        this.brokerForm.connecting = false;
      }
    },

    async disconnectBroker() {
      await fetch('/api/disconnect', { method: 'POST' });
      this.ext.connected   = false;
      this.ext.brokerLabel = '';
      this.ext.message     = 'Disconnected';
    },

    async reconnectLocal() {
      try {
        await fetch('/api/local/reconnect', { method: 'POST' });
        this.toast('Reconnecting to Mosquitto…', 'info');
      } catch (e) {
        this.toast('Reconnect failed: ' + String(e), 'error');
      }
    },

    // ── Gito ───────────────────────────────────────────────────────────────
    async loginGito() {
      if (!this.gitoForm.email || !this.gitoForm.password) return;
      this.gitoForm.loading = true;
      this.gitoForm.error   = '';
      try {
        const r = await fetch('/api/gito/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            gito_url: this.gitoForm.url,
            email:    this.gitoForm.email,
            password: this.gitoForm.password,
          }),
        });
        const d = await r.json();
        if (d.ok) {
          this.gito.loggedIn     = true;
          this.gito.tenantId     = d.tenant_id;
          this.gito.emailDisplay = d.email;
          this.gitoForm.password = '';   // clear sensitive field
          this.gitoForm.error    = '';
          // Panel stays open — user now sees the "Connected" state clearly
          this.toast('Logged in as ' + d.email, 'success');
          // Fire device loading in background — non-blocking
          Promise.all([this.loadDeviceTypes(), this.loadGitoDevices()]);
        } else {
          this.gitoForm.error = d.message || 'Login failed';
        }
      } catch (e) {
        this.gitoForm.error = String(e);
      } finally {
        this.gitoForm.loading = false;
      }
    },

    logoutGito() {
      this.gito.loggedIn     = false;
      this.gito.tenantId     = null;
      this.gito.emailDisplay = '';
      this.deviceTypes       = [];
      this.gitoDevices       = [];
      this.toast('Logged out', 'info');
    },

    async loadDeviceTypes() {
      try {
        const r = await fetch('/api/gito/device-types');
        const d = await r.json();
        if (d.ok) {
          this.deviceTypes = d.device_types || [];
        } else {
          this.toast('Device types: ' + (d.message || 'load failed'), 'error');
        }
      } catch (e) {
        this.toast('Device types error: ' + String(e), 'error');
      }
    },

    async loadGitoDevices() {
      this.loadingDevices = true;
      try {
        const r = await fetch('/api/gito/devices');
        const d = await r.json();
        if (d.ok) {
          this.gitoDevices = d.devices || [];
        } else {
          this.toast('Devices: ' + (d.message || 'load failed'), 'error');
        }
      } catch (e) {
        this.toast('Devices error: ' + String(e), 'error');
      } finally {
        this.loadingDevices = false;
      }
    },

    async switchToLinkMode() {
      this.linkMode = 'link';
      if (this.gito.loggedIn && this.gitoDevices.length === 0) {
        await this.loadGitoDevices();
      }
    },

    // ── Simulator ──────────────────────────────────────────────────────────
    async checkSimulatorStatus() {
      try {
        const r = await fetch('/api/simulator/status');
        const d = await r.json();
        this.simulator.running = d.running;
        this.simulator.pid     = d.pid;
      } catch (_) {}
    },

    async startSimulator() {
      this.simulator.loading = true;
      try {
        const r = await fetch('/api/simulator/start', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ interval: this.simulator.interval }),
        });
        const d = await r.json();
        this.simulator.running = d.running;
        this.simulator.pid     = d.pid;
        if (d.running) this.toast('Simulator started (PID ' + d.pid + ')', 'success');
      } catch (e) {
        this.toast('Start failed: ' + String(e), 'error');
      } finally {
        this.simulator.loading = false;
      }
    },

    async stopSimulator() {
      this.simulator.loading = true;
      try {
        await fetch('/api/simulator/stop', { method: 'POST' });
        this.simulator.running = false;
        this.simulator.pid     = null;
        this.toast('Simulator stopped', 'info');
      } catch (e) {
        this.toast('Stop failed: ' + String(e), 'error');
      } finally {
        this.simulator.loading = false;
      }
    },

    // ── Topics ─────────────────────────────────────────────────────────────
    selectTopic(t) {
      this.selectedTopic  = t;
      this.createError    = '';
      this.linkError      = '';
      this.selectedDevice = null;
      this.deviceSearch   = '';
      this.linkMode       = 'create';
      // Always reset the form for the newly selected topic
      this.newDevice = {
        name:         this.suggestName(t.topic),
        deviceTypeId: '',
        description:  '',
        location:     '',
      };
    },

    // ── Create & Bridge ────────────────────────────────────────────────────
    async createAndBridge() {
      if (!this.selectedTopic || !this.newDevice.name.trim()) return;
      this.creating = true;
      this.createError = '';
      try {
        const cr = await fetch('/api/gito/create-device', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            name:             this.newDevice.name.trim(),
            device_type_id:   this.newDevice.deviceTypeId || null,
            device_type_name: this.newDevice.deviceTypeId
              ? (this.deviceTypes.find(dt => dt.id === this.newDevice.deviceTypeId)?.name || '')
              : '',
            description: this.newDevice.description,
            location:    this.newDevice.location,
            topic:       this.selectedTopic.topic,
          }),
        });
        const cd = await cr.json();
        if (!cd.ok) {
          this.createError = cd.message || 'Failed to create device';
          return;
        }

        const br = await fetch('/api/bridge/start', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            topic:       this.selectedTopic.topic,
            device_id:   cd.device.id,
            device_name: cd.device.name,
          }),
        });
        const bd = await br.json();
        if (bd.ok) {
          this.bridges.push(bd.bridge);
          this.newDevice = { name: '', deviceTypeId: '', description: '', location: '' };
          this.panels.broker = false;
          this.panels.gito   = false;
          this.toast('Device created & bridge started!', 'success');
          await Promise.all([this.loadSaved(), this.loadGitoDevices()]);
        } else {
          this.createError = bd.message || 'Failed to start bridge';
        }
      } catch (e) {
        this.createError = String(e);
      } finally {
        this.creating = false;
      }
    },

    async linkAndBridge() {
      if (!this.selectedTopic || !this.selectedDevice) return;
      const deviceName = this.selectedDevice.name; // capture before we clear it
      this.linking   = true;
      this.linkError = '';
      try {
        const br = await fetch('/api/bridge/start', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            topic:       this.selectedTopic.topic,
            device_id:   this.selectedDevice.id,
            device_name: this.selectedDevice.name,
          }),
        });
        const bd = await br.json();
        if (bd.ok) {
          this.bridges.push(bd.bridge);
          this.selectedDevice = null;
          this.deviceSearch   = '';
          this.linkMode       = 'create';
          this.toast('Bridge started for ' + deviceName, 'success');
          await this.loadSaved();
        } else {
          this.linkError = bd.message || 'Failed to start bridge';
        }
      } catch (e) {
        this.linkError = String(e);
      } finally {
        this.linking = false;
      }
    },

    async stopBridge(bridgeId) {
      const r = await fetch('/api/bridge/stop', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ bridge_id: bridgeId }),
      });
      const d = await r.json();
      if (d.ok) {
        const b = this.bridges.find(x => x.id === bridgeId);
        if (b) b.active = false;
        this.toast('Bridge stopped', 'info');
        await this.loadSaved();
      }
    },

    async stopBridgeForTopic(topic) {
      const b = this.bridges.find(x => x.topic === topic && x.active);
      if (b) await this.stopBridge(b.id);
    },

    // ── Socket.IO ──────────────────────────────────────────────────────────
    initSocket() {
      const io = window.io();

      io.on('broker_status', (d) => {
        const wasConnected = this.ext.connected;
        this.ext.connected         = d.connected;
        this.ext.message           = d.message || '';
        this.brokerForm.connecting = false; // DNS + TCP result is now known
        if (d.connected) {
          this.ext.brokerLabel = this.brokerForm.host + ':' + this.brokerForm.port;
          this.panels.broker   = false;
          if (!wasConnected) this.toast('Connected to ' + this.ext.brokerLabel, 'success');
        } else if (wasConnected) {
          this.ext.brokerLabel = '';
          this.toast('External broker disconnected', 'error');
          this.panels.broker = true; // re-open so user can reconnect
        } else {
          // Connect attempt failed (error from background thread)
          this.toast(d.message || 'Connection failed', 'error');
        }
      });

      io.on('local_status', (d) => {
        const wasConnected = this.local.connected;
        this.local.connected = d.connected;
        this.local.message   = d.message || '';
        if (d.connected && !wasConnected) {
          this.toast('Mosquitto connected', 'success');
        } else if (!d.connected && wasConnected) {
          this.toast('Mosquitto disconnected!', 'error');
        }
      });

      io.on('topic_update', (d) => {
        const existing = this.topics.find(t => t.topic === d.topic);
        if (existing) {
          existing.count        = d.count;
          existing.last_payload = d.payload;
          existing.last_seen    = d.last_seen;
          existing.parsed       = d.parsed;
          existing.metrics      = d.metrics;
          if (this.selectedTopic?.topic === d.topic) {
            this.selectedTopic = { ...existing };
          }
        } else {
          this.topics.unshift({
            topic:        d.topic,
            count:        d.count,
            last_payload: d.payload,
            last_seen:    d.last_seen,
            parsed:       d.parsed,
            metrics:      d.metrics,
          });
        }
      });

      io.on('bridge_update', (d) => {
        const b = this.bridges.find(x => x.id === d.bridge_id);
        if (!b) return;
        if (d.count        !== undefined) b.count        = d.count;
        if (d.last_value   !== undefined) b.last_value   = d.last_value;
        if (d.last_forward !== undefined) b.last_forward = d.last_forward;
        if (d.status       !== undefined) b.status       = d.status;
      });
    },

    // ── Init ───────────────────────────────────────────────────────────────
    async init() {
      this.initSocket();
      try {
        const r = await fetch('/api/status');
        const s = await r.json();
        this.local.connected = s.local_connected;
        this.ext.connected   = s.ext_connected;
      } catch (_) {}
      try {
        const r = await fetch('/api/bridges');
        this.bridges = await r.json();
      } catch (_) {}
      await this.restoreSession(); // restore Gito login if bridge already has a token
      await this.loadSaved();
      await this.checkSimulatorStatus();
      setInterval(() => this.checkSimulatorStatus(), 15000);
      setInterval(() => { this._tick++; }, 5000); // refresh timeAgo displays
    },

    async restoreSession() {
      try {
        const r = await fetch('/api/gito/session');
        const d = await r.json();
        if (d.ok && d.logged_in) {
          this.gito.loggedIn     = true;
          this.gito.tenantId     = d.tenant_id;
          this.gito.emailDisplay = d.email;
          this.panels.gito       = false; // collapse — already logged in
          // Load device data in background
          Promise.all([this.loadDeviceTypes(), this.loadGitoDevices()]);
        }
      } catch (_) {}
    },

    async loadSaved() {
      try {
        const r = await fetch('/api/bridge/saved');
        this.savedBridges = await r.json();
      } catch (_) {}
    },

    async resumeBridge(topic) {
      try {
        const r = await fetch('/api/bridge/resume', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ topic }),
        });
        const d = await r.json();
        if (d.ok) {
          this.bridges.push(d.bridge);
          await this.loadSaved();
          this.toast('Bridge resumed', 'success');
        } else {
          this.toast(d.message || 'Failed to resume', 'error');
        }
      } catch (e) {
        this.toast(String(e), 'error');
      }
    },

    async deleteSaved(topic) {
      try {
        await fetch('/api/bridge/saved/delete', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ topic }),
        });
        await this.loadSaved();
        this.toast('Saved bridge removed', 'info');
      } catch (_) {}
    },
  };
}
</script>
